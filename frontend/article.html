<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>लेख — जल धारा जयपुर</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav"><div class="nav-inner">
    <a href="index.html" class="logo">जल <span class="logo-accent">धारा</span> जयपुर</a>
    <div class="nav-right">
      <select id="langSelect" class="lang-select">
        <option value="hi" selected>हिन्दी</option>
        <option value="en">English</option>
        <option value="mr">मराठी</option>
        <option value="ta">तमिल</option>
        <option value="gu">गुजराती</option>
        <option value="bn">बांग्ला</option>
        <option value="pa">पंजाबी</option>
        <option value="ur">उर्दू</option>
        <option value="ar">العربية</option>
        <option value="fr">Français</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div></header>
  <main class="container" style="padding-top:48px;padding-bottom:64px;max-width:760px;">
    <a href="index.html" style="color:var(--accent);font-weight:600;">← वापस</a>
    <h1 id="title" style="font-size:34px;margin:20px 0 8px;">लोड हो रहा है...</h1>
    <div id="meta" class="row-meta" style="margin-bottom:24px;"></div>
    <div id="body" style="font-size:17px;color:#26282e;"></div>
  </main>
  <script>
    const API = 'http://localhost:5000/api';
    const id = new URLSearchParams(location.search).get('id');
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const fmt = iso => { const d = new Date(iso); return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`; };
    async function load(lang) {
      const q = lang && lang !== 'hi' ? `?lang=${lang}` : '';
      const res = await fetch(`${API}/articles/${id}${q}`);
      if (!res.ok) { document.getElementById('title').textContent = 'लेख नहीं मिला'; return; }
      const a = await res.json();
      document.getElementById('title').textContent = a.title;
      document.getElementById('meta').innerHTML = `<span class="pill">${a.category}</span><span>${fmt(a.createdAt)}</span>`;
      document.getElementById('body').innerHTML = a.body;
    }
    document.getElementById('langSelect').addEventListener('change', e => load(e.target.value));
    load('hi');
  </script>
</body>
</html>
